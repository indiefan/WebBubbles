name: Rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to roll back to (short SHA from a previous deploy)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag image as latest
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          TARGET="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          echo "Rolling back: retagging $SOURCE → $TARGET"

          docker buildx imagetools create --tag "$TARGET" "$SOURCE"

      - name: Trigger Portainer webhook
        run: |
          curl -sf -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            || echo "::warning::Portainer webhook failed — stack may need manual update"

      - name: Summary
        run: |
          echo "## Rollback complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Rolled back to image tag: \`${{ inputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
